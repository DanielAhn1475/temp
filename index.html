<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0878d8" />
  <meta name="description" content="중국 위안(CNY), 미국 달러(USD)를 한화(KRW)로 계산하는 환율 계산기입니다." />
  <title>원화 환율 계산기</title>

  <link rel="manifest" href="manifest.json?v=1.0.7" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=1.0.7" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=1.0.7" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1.0.7" />

  <style>
    @font-face {
      font-family: "RixYoyohi";
      src: url("./RixYoyohi.ttf") format("truetype");
      font-weight: 400 950;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #eef9fb;
      --bg2: #eaf4ff;
      --card: rgba(255, 255, 255, 0.94);
      --text: #102033;
      --muted: #64748b;
      --primary: #0878d8;
      --primary-dark: #075ea8;
      --primary-soft: #e3f5ff;
      --green: #00a879;
      --green-dark: #007d63;
      --border: #d8e7f1;
      --danger: #b91c1c;
      --shadow: 0 20px 50px rgba(6, 78, 130, 0.15);
      --version: "v1.0.7";
    }

    * { box-sizing: border-box; }

    button, input, textarea, select {
      font-family: inherit;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "RixYoyohi", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(0, 212, 153, 0.24), transparent 34%),
        radial-gradient(circle at 90% 4%, rgba(0, 117, 255, 0.24), transparent 36%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      padding: 20px 12px 28px;
    }

    .wrap {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 10px 0 16px;
    }

    .app-icon {
      width: 86px;
      height: 86px;
      border-radius: 24px;
      box-shadow: 0 16px 38px rgba(7, 94, 168, 0.25);
      display: block;
      margin: 0 auto 12px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 7vw, 42px);
      letter-spacing: -0.05em;
      line-height: 1.08;
      font-weight: 950;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .install-card {
      background: linear-gradient(135deg, rgba(0, 168, 121, 0.12), rgba(8, 120, 216, 0.12));
      border: 1px solid rgba(8, 120, 216, 0.20);
      border-radius: 24px;
      padding: 16px;
      margin: 0 0 14px;
      display: block;
      text-align: center;
      box-shadow: 0 14px 30px rgba(6, 78, 130, 0.08);
    }

    .install-title {
      font-size: 16px;
      font-weight: 950;
      letter-spacing: -0.03em;
      margin-bottom: 3px;
    }

    .install-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .install-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .main-card {
      background: var(--card);
      border: 1px solid rgba(216, 231, 241, 0.92);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: clamp(16px, 4vw, 28px);
      backdrop-filter: blur(12px);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 20px;
      padding: 10px 8px 9px;
      cursor: pointer;
      min-height: 58px;
      transition: transform .15s ease, border .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .tab strong {
      display: block;
      font-size: clamp(16px, 4.3vw, 22px);
      font-weight: 950;
      letter-spacing: -0.05em;
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .tab span {
      display: block;
      color: var(--muted);
      font-weight: 950;
      letter-spacing: .02em;
      font-size: clamp(12px, 3.3vw, 15px);
      line-height: 1.1;
    }

    .tab.active {
      background: linear-gradient(135deg, #e5fff7, #e4f4ff);
      border-color: var(--green-dark);
      box-shadow: 0 12px 30px rgba(0, 125, 99, 0.13);
    }

    .tab:active { transform: scale(0.985); }

    .calculator {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: end;
    }

    .field { display: grid; gap: 8px; }

    label {
      font-size: 13px;
      font-weight: 950;
      color: #304156;
    }

    .input-wrap { position: relative; }

    input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 19px;
      padding: 14px 66px 14px 15px;
      font-size: clamp(20px, 5.2vw, 31px);
      font-weight: 950;
      color: var(--text);
      outline: none;
      background: #fff;
      transition: border .15s ease, box-shadow .15s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 5px rgba(8, 120, 216, 0.12);
    }

    .unit {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 950;
      color: var(--primary-dark);
      pointer-events: none;
    }

    .swap {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--primary));
      color: #fff;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(8, 120, 216, 0.24);
      margin-bottom: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .rate-panel {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 12px;
    }

    .info-box, .manual-box {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 15px;
      background: #fff;
    }

    .rate-main {
      font-size: clamp(17px, 4vw, 24px);
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-bottom: 7px;
    }

    .rate-sub, .notice {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
    }

    .notice { margin: 10px 0 0; }
    .notice strong { color: var(--danger); }

    .manual-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 9px;
    }

    .manual-row input {
      font-size: 16px;
      padding: 13px 46px 13px 12px;
      border-radius: 15px;
    }

    .btn {
      border: 0;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--primary), #0057b8);
      color: white;
      padding: 12px 13px;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(8, 120, 216, 0.18);
    }

    .btn.green { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
    .btn.dark { background: #0f172a; }
    .btn.soft {
      background: #e5fff7;
      color: var(--green-dark);
      border: 1px solid rgba(0, 125, 99, 0.22);
      box-shadow: none;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-buttons {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .quick-buttons button {
      border: 1px solid rgba(8, 120, 216, .18);
      background: var(--primary-soft);
      color: var(--primary-dark);
      border-radius: 14px;
      padding: 10px 5px;
      font-weight: 950;
      cursor: pointer;
    }

    .install-guide {
      display: none;
      margin-top: 12px;
      padding: 13px;
      border-radius: 18px;
      background: rgba(255,255,255,.74);
      border: 1px dashed rgba(8, 120, 216, .28);
      font-size: 12px;
      color: #475569;
      line-height: 1.55;
      font-weight: 800;
    }

    .install-guide.show { display: block; }

    .install-card.hide { display: none; }

    .footer {
      margin-top: 15px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
    }

    .version {
      margin-top: 8px;
      color: #7890a4;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    @media (max-width: 720px) {
      body { padding: 12px 10px 22px; }
      .app-icon { width: 76px; height: 76px; border-radius: 22px; }
      .install-card { border-radius: 22px; padding: 14px; }
      .tabs { gap: 10px; margin-bottom: 12px; }
      .tab { min-height: 54px; padding: 8px 6px 7px; border-radius: 18px; }
      .calculator { grid-template-columns: 1fr; gap: 9px; }
      .swap { justify-self: center; transform: rotate(90deg); margin: -1px 0; width: 32px; height: 32px; font-size: 17px; }
      .rate-panel { grid-template-columns: 1fr; }
      .manual-row { grid-template-columns: 1fr auto; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <img class="app-icon" src="icon-512.png?v=1.0.7" alt="원화 환율 계산기 아이콘" />
      <h1>원화 환율 계산기</h1>
      <p class="sub">중국 위안과 미국 달러를 한화로 빠르게 계산합니다.</p>
    </section>

    <section class="install-card" id="installCard" aria-label="홈 화면 추가 안내">
      <div class="install-title">휴대폰 바탕화면에 아이콘 추가</div>
      <div class="install-desc" id="installDesc">자주 쓰는 계산기를 앱처럼 바로 실행할 수 있습니다.</div>
      <div class="install-actions">
        <button class="btn green" id="installBtn" type="button">홈 화면에 추가하기</button>
        <button class="btn soft" id="guideBtn" type="button">설치 방법 보기</button>
      </div>
      <div class="install-guide" id="installGuide"></div>
    </section>

    <section class="main-card" aria-label="환율 계산기">
      <div class="tabs" role="tablist" aria-label="통화 선택">
        <button class="tab active" id="tabCny" type="button" data-currency="CNY">
          <strong>중국 위안</strong>
          <span>CNY ↔ KRW</span>
        </button>
        <button class="tab" id="tabUsd" type="button" data-currency="USD">
          <strong>미국 달러</strong>
          <span>USD ↔ KRW</span>
        </button>
      </div>

      <div class="calculator">
        <div class="field">
          <label id="foreignLabel" for="foreignInput">중국 위안 입력</label>
          <div class="input-wrap">
            <input id="foreignInput" type="text" inputmode="decimal" placeholder="예: 100" autocomplete="off" />
            <span class="unit" id="foreignUnit">CNY</span>
          </div>
        </div>

        <button class="swap" id="swapBtn" type="button" title="입력값 서로 바꾸기">⇄</button>

        <div class="field">
          <label for="krwInput">한화 결과</label>
          <div class="input-wrap">
            <input id="krwInput" type="text" inputmode="decimal" placeholder="자동 계산" autocomplete="off" />
            <span class="unit">KRW</span>
          </div>
        </div>
      </div>

      <div class="quick-buttons" aria-label="빠른 입력">
        <button type="button" data-amount="10">10</button>
        <button type="button" data-amount="50">50</button>
        <button type="button" data-amount="100">100</button>
        <button type="button" data-amount="1000">1,000</button>
      </div>

      <div class="rate-panel">
        <div class="info-box">
          <div class="rate-main" id="rateText">환율 불러오는 중...</div>
          <div class="rate-sub" id="rateSub">무료 환율 API에서 환율을 가져옵니다.</div>
          <div class="actions">
            <button class="btn" id="refreshBtn" type="button">환율 새로고침</button>
            <button class="btn soft" id="clearBtn" type="button">입력 지우기</button>
          </div>
        </div>

        <div class="manual-box">
          <label id="manualLabel" for="manualRate">수동 환율 입력</label>
          <div class="manual-row">
            <div class="input-wrap">
              <input id="manualRate" type="text" inputmode="decimal" placeholder="예: 190.50" autocomplete="off" />
              <span class="unit">원</span>
            </div>
            <button class="btn dark" id="applyManualBtn" type="button">적용</button>
          </div>
          <p class="notice" id="manualNotice">
            API가 안 되거나 실제 환전소 환율을 쓰려면 <strong>1위안당 원화</strong>를 직접 입력하세요.
          </p>
        </div>
      </div>

      <p class="footer">
        표시 금액은 참고용입니다.<br>은행·카드사·환전소 수수료와 매매기준율 차이는 반영되지 않습니다.
      </p>
      <div class="version" id="versionText">버전 v1.0.7 · 업데이트 2026.05.28</div>
    </section>
  </main>

  <script>
    const APP_VERSION = "v1.0.7";
    const UPDATED_AT = "2026.05.28";

    const CURRENCIES = {
      CNY: {
        name: "중국 위안",
        unit: "CNY",
        krName: "위안",
        placeholder: "예: 100",
        quick: [10, 50, 100, 1000],
        cacheKey: "cny-krw-rate-cache-v106",
        manualHint: "1위안당 원화",
        apis: [
          "https://api.frankfurter.dev/v2/rates?base=CNY&quotes=KRW",
          "https://api.frankfurter.app/latest?from=CNY&to=KRW",
          "https://open.er-api.com/v6/latest/CNY"
        ]
      },
      USD: {
        name: "미국 달러",
        unit: "USD",
        krName: "달러",
        placeholder: "예: 100",
        quick: [10, 50, 100, 1000],
        cacheKey: "usd-krw-rate-cache-v106",
        manualHint: "1달러당 원화",
        apis: [
          "https://api.frankfurter.dev/v2/rates?base=USD&quotes=KRW",
          "https://api.frankfurter.app/latest?from=USD&to=KRW",
          "https://open.er-api.com/v6/latest/USD"
        ]
      }
    };

    const foreignInput = document.getElementById("foreignInput");
    const krwInput = document.getElementById("krwInput");
    const manualRateInput = document.getElementById("manualRate");
    const rateText = document.getElementById("rateText");
    const rateSub = document.getElementById("rateSub");
    const refreshBtn = document.getElementById("refreshBtn");
    const clearBtn = document.getElementById("clearBtn");
    const swapBtn = document.getElementById("swapBtn");
    const applyManualBtn = document.getElementById("applyManualBtn");
    const foreignLabel = document.getElementById("foreignLabel");
    const foreignUnit = document.getElementById("foreignUnit");
    const manualLabel = document.getElementById("manualLabel");
    const manualNotice = document.getElementById("manualNotice");
    const tabCny = document.getElementById("tabCny");
    const tabUsd = document.getElementById("tabUsd");
    const quickButtons = document.querySelectorAll(".quick-buttons button");
    const installCard = document.getElementById("installCard");
    const installBtn = document.getElementById("installBtn");
    const guideBtn = document.getElementById("guideBtn");
    const installGuide = document.getElementById("installGuide");
    const installDesc = document.getElementById("installDesc");
    const versionText = document.getElementById("versionText");

    let currentCurrency = "CNY";
    let currentRate = null;
    let rateDate = "";
    let rateSource = "api";
    let lastEdited = "foreign";
    let deferredInstallPrompt = null;

    versionText.textContent = `버전 ${APP_VERSION} · 업데이트 ${UPDATED_AT}`;
    versionText.style.textAlign = "center";

    function isKakaoBrowser() {
      return /KAKAOTALK/i.test(navigator.userAgent);
    }

    function isIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }

    function isAndroid() {
      return /android/i.test(navigator.userAgent);
    }

    function isStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function isHomeScreenLaunch() {
      const params = new URLSearchParams(window.location.search);
      return isStandaloneMode() || params.get("app") === "1" || params.get("source") === "pwa";
    }

    function openInChromeFromKakao() {
      const url = new URL(window.location.href);
      const intentUrl = `intent://${url.host}${url.pathname}${url.search}#Intent;scheme=${url.protocol.replace(":", "")};package=com.android.chrome;end`;
      window.location.href = intentUrl;
    }

    function getInstallGuideText() {
      if (isHomeScreenLaunch()) {
        installDesc.textContent = "이미 홈 화면 앱처럼 실행 중입니다.";
        return "이미 홈 화면에 추가된 상태입니다. 다음부터는 휴대폰 바탕화면의 아이콘으로 바로 실행하면 됩니다.";
      }
      if (isKakaoBrowser() && isAndroid()) {
        installDesc.textContent = "카카오톡에서는 먼저 Chrome으로 열어야 설치할 수 있습니다.";
        return "아래 ‘Chrome에서 열기’ 버튼을 누른 뒤, Chrome 오른쪽 위 ⋮ 메뉴에서 ‘홈 화면에 추가’ 또는 ‘앱 설치’를 선택하세요.";
      }
      if (isKakaoBrowser()) {
        installDesc.textContent = "카카오톡에서는 먼저 Safari 또는 외부 브라우저로 열어야 설치할 수 있습니다.";
        return "카카오톡 화면의 공유/더보기 메뉴에서 Safari로 열기 또는 다른 브라우저로 열기를 선택한 뒤, 공유 버튼 → ‘홈 화면에 추가’를 누르세요.";
      }
      if (isIOS()) {
        installDesc.textContent = "아이폰은 Safari 공유 버튼에서 홈 화면에 추가할 수 있습니다.";
        return "Safari 아래쪽 공유 버튼을 누른 뒤 ‘홈 화면에 추가’를 선택하고, 오른쪽 위 ‘추가’를 누르세요.";
      }
      return "Chrome에서 설치창이 뜨면 ‘설치’ 또는 ‘홈 화면에 추가’를 누르세요. 설치창이 안 뜨면 Chrome 오른쪽 위 ⋮ 메뉴에서 ‘홈 화면에 추가’를 선택하세요.";
    }

    function showInstallGuide() {
      installGuide.textContent = getInstallGuideText();
      installGuide.classList.add("show");
    }

    function updateInstallButtonState() {
      if (isHomeScreenLaunch()) {
        installCard.classList.add("hide");
        installBtn.textContent = "이미 추가됨";
        installBtn.disabled = true;
      } else if (isKakaoBrowser() && isAndroid()) {
        installCard.classList.remove("hide");
        installBtn.textContent = "Chrome에서 열기";
        installBtn.disabled = false;
      } else {
        installCard.classList.remove("hide");
        installBtn.textContent = "홈 화면에 추가하기";
        installBtn.disabled = false;
      }
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      updateInstallButtonState();
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      updateInstallButtonState();
      installGuide.textContent = "설치가 완료되었습니다. 이제 휴대폰 바탕화면 아이콘으로 실행할 수 있습니다.";
      installGuide.classList.add("show");
    });

    installBtn.addEventListener("click", async () => {
      if (isHomeScreenLaunch()) {
        installCard.classList.add("hide");
        return;
      }

      if (isKakaoBrowser() && isAndroid()) {
        showInstallGuide();
        openInChromeFromKakao();
        return;
      }

      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice.catch(() => null);
        deferredInstallPrompt = null;
        if (choice && choice.outcome === "accepted") {
          installGuide.textContent = "설치가 진행 중입니다. 설치가 끝나면 바탕화면 아이콘으로 실행하세요.";
        } else {
          installGuide.textContent = "설치창을 닫았다면 Chrome 메뉴 ⋮에서 ‘홈 화면에 추가’를 다시 선택할 수 있습니다.";
        }
        installGuide.classList.add("show");
        return;
      }

      showInstallGuide();
      alert(getInstallGuideText());
    });

    guideBtn.addEventListener("click", showInstallGuide);
    updateInstallButtonState();
    if (!isHomeScreenLaunch()) {
      showInstallGuide();
    }

    function parseNumber(value) {
      const cleaned = String(value).replace(/,/g, "").trim();
      if (!cleaned) return NaN;
      return Number(cleaned);
    }

    function formatNumber(value, maximumFractionDigits = 2) {
      if (!Number.isFinite(value)) return "";
      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits }).format(value);
    }

    function formatKRW(value) {
      if (!Number.isFinite(value)) return "";
      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(Math.round(value));
    }

    function activeInfo() {
      return CURRENCIES[currentCurrency];
    }

    function saveRateToCache(rate, date) {
      localStorage.setItem(activeInfo().cacheKey, JSON.stringify({ rate, date, savedAt: new Date().toISOString(), version: APP_VERSION }));
    }

    function loadRateFromCache() {
      try {
        const raw = localStorage.getItem(activeInfo().cacheKey);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!Number.isFinite(Number(data.rate))) return null;
        return { rate: Number(data.rate), date: data.date || "저장된 환율" };
      } catch {
        return null;
      }
    }

    function getManualRate() {
      const manual = parseNumber(manualRateInput.value);
      return Number.isFinite(manual) && manual > 0 ? manual : null;
    }

    function getEffectiveRate() {
      const manual = getManualRate();
      if (manual) return manual;
      return currentRate;
    }

    function updateRateDisplay() {
      const info = activeInfo();
      const manual = getManualRate();
      const rate = getEffectiveRate();

      if (!rate) {
        rateText.textContent = "환율을 가져오지 못했습니다";
        rateSub.textContent = `수동 환율에 ${info.manualHint} 금액을 입력해서 계산하세요.`;
        return;
      }

      if (manual) {
        rateText.textContent = `1 ${info.unit} = ${formatNumber(manual, 4)} KRW`;
        rateSub.textContent = "수동 입력 환율을 기준으로 계산 중입니다.";
      } else {
        rateText.textContent = `1 ${info.unit} = ${formatNumber(rate, 4)} KRW`;
        rateSub.textContent = `${rateDate ? rateDate + " 기준 · " : ""}${rateSource === "cache" ? "저장된 환율 사용" : "환율 API 기준"}`;
      }
    }

    function calculateFromForeign() {
      lastEdited = "foreign";
      const amount = parseNumber(foreignInput.value);
      const rate = getEffectiveRate();
      if (!Number.isFinite(amount) || !rate) {
        krwInput.value = "";
        return;
      }
      krwInput.value = formatKRW(amount * rate);
    }

    function calculateFromKRW() {
      lastEdited = "krw";
      const amount = parseNumber(krwInput.value);
      const rate = getEffectiveRate();
      if (!Number.isFinite(amount) || !rate) {
        foreignInput.value = "";
        return;
      }
      foreignInput.value = formatNumber(amount / rate, 2);
    }

    function recalculate() {
      updateRateDisplay();
      if (lastEdited === "krw") calculateFromKRW();
      else calculateFromForeign();
    }

    async function fetchJsonWithTimeout(url) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      try {
        const response = await fetch(url, { signal: controller.signal, cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function extractRate(data) {
      const rate = Number(data?.rates?.KRW);
      if (Number.isFinite(rate) && rate > 0) return rate;
      return null;
    }

    async function fetchRate() {
      const info = activeInfo();
      rateText.textContent = "환율 불러오는 중...";
      rateSub.textContent = `${info.unit} → KRW 환율을 확인하고 있습니다.`;
      currentRate = null;

      for (const url of info.apis) {
        try {
          const data = await fetchJsonWithTimeout(url);
          const rate = extractRate(data);
          if (!rate) throw new Error("환율 데이터 오류");
          currentRate = rate;
          rateDate = data.date || data.time_last_update_utc || "";
          rateSource = "api";
          saveRateToCache(currentRate, rateDate);
          recalculate();
          return;
        } catch (error) {
          // 다음 API를 계속 시도합니다.
        }
      }

      const cached = loadRateFromCache();
      if (cached) {
        currentRate = cached.rate;
        rateDate = cached.date;
        rateSource = "cache";
        recalculate();
      } else {
        currentRate = null;
        rateDate = "";
        rateSource = "manual";
        updateRateDisplay();
      }
    }

    function setCurrency(currency) {
      if (!CURRENCIES[currency]) return;
      currentCurrency = currency;
      const info = activeInfo();

      tabCny.classList.toggle("active", currency === "CNY");
      tabUsd.classList.toggle("active", currency === "USD");
      foreignLabel.textContent = `${info.name} 입력`;
      foreignUnit.textContent = info.unit;
      foreignInput.placeholder = info.placeholder;
      manualLabel.textContent = `수동 환율 입력`;
      manualNotice.innerHTML = `API가 안 되거나 실제 환전소 환율을 쓰려면 <strong>${info.manualHint}</strong>를 직접 입력하세요.`;
      quickButtons.forEach((btn, i) => {
        const amount = info.quick[i];
        btn.dataset.amount = String(amount);
        btn.textContent = formatNumber(amount, 0);
      });

      foreignInput.value = "";
      krwInput.value = "";
      manualRateInput.value = "";
      lastEdited = "foreign";
      fetchRate();
    }

    foreignInput.addEventListener("input", calculateFromForeign);
    krwInput.addEventListener("input", calculateFromKRW);
    manualRateInput.addEventListener("input", recalculate);
    applyManualBtn.addEventListener("click", recalculate);
    refreshBtn.addEventListener("click", fetchRate);
    tabCny.addEventListener("click", () => setCurrency("CNY"));
    tabUsd.addEventListener("click", () => setCurrency("USD"));

    quickButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        foreignInput.value = formatNumber(Number(btn.dataset.amount), 0);
        calculateFromForeign();
      });
    });

    clearBtn.addEventListener("click", () => {
      foreignInput.value = "";
      krwInput.value = "";
      manualRateInput.value = "";
      lastEdited = "foreign";
      updateRateDisplay();
      foreignInput.focus();
    });

    swapBtn.addEventListener("click", () => {
      const foreign = foreignInput.value;
      const krw = krwInput.value;
      foreignInput.value = "";
      krwInput.value = krw || foreign;
      calculateFromKRW();
      krwInput.focus();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js?v=1.0.7").catch(() => null);
      });
    }

    fetchRate();
  </script>
</body>
</html>
